<!DOCTYPE html>
<html>
<head>
<title>Join Doctor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-box">
<h2>Doctor Registration 🩺</h2>

<input id="name" placeholder="Doctor Name"><br>
<input id="spec" placeholder="Speciality"><br>
<input id="phone" placeholder="WhatsApp Number"><br>

<button class="btn" onclick="save()">Register</button>
</div>

<a href="index.html" class="back">⬅ Back</a>

<script>

function save(){

    // 🔐 LOGIN CHECK
    let email = localStorage.getItem("currentUserEmail");

    if(!email){
        alert("Please login first ❌");
        window.location.href = "login.html";
        return;
    }

    // 📥 INPUT VALUES
    let nameInput = document.getElementById("name");
    let specInput = document.getElementById("spec");
    let phoneInput = document.getElementById("phone");

    let name = nameInput.value.trim();
    let spec = specInput.value.trim();
    let phone = phoneInput.value.trim();

    // 🚨 VALIDATION
    if(name === "" || spec === "" || phone === ""){
        alert("Please fill all fields!");
        return;
    }

    // 🔥 UNIQUE KEY (duplicate fix)
    let key = "doc_" + Date.now();

    let d = {
        name: name,
        spec: spec,
        phone: phone,
        email: email,
        premium: false
    };

    // 💾 SAVE
    localStorage.setItem(key, JSON.stringify(d));

    alert("Doctor Added Successfully ✅");

    // 🧹 CLEAR FORM
    nameInput.value = "";
    specInput.value = "";
    phoneInput.value = "";

    // 🔁 REDIRECT
    window.location.href = "doctors.html";
}

</script>

</body>
</html>
