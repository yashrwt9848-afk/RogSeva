<!DOCTYPE html>
<html>
<head>
<title>Doctors</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Available Doctors</h2>

<div id="list"></div>

<script>
let list = document.getElementById("list");

for(let i=0; i<localStorage.length; i++){
    let key = localStorage.key(i);

    if(key.startsWith("doctor_")){
        let doc = JSON.parse(localStorage.getItem(key));

        list.innerHTML += `
        <div class="card">
            <h3>${doc.name}</h3>
            <p>${doc.speciality}</p>
            <a href="https://wa.me/${doc.phone}">Chat</a>
        </div>`;
    }
}
</script>

</body>
</html>
