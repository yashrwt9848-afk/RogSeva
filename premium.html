<!DOCTYPE html>
<html>
<head>
<title>Premium</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 style="text-align:center;margin-top:100px;">Premium Plans 💎</h2>

<div class="card">
    <h3>Basic</h3>
    <p>₹199/month</p>
    <button class="btn" onclick="payNow()">Buy Premium</button>
</div>

<div class="card">
    <h3>Pro</h3>
    <p>₹499/month</p>
    <button class="btn" onclick="payNow()">Buy Premium</button>
</div>

<a href="index.html" class="back">⬅ Back</a>

<script>
function payNow(){
    alert("Payment system connected (Demo Mode)");

    let email = localStorage.getItem("currentUserEmail");

    for(let i=0;i<localStorage.length;i++){
        let key = localStorage.key(i);

        if(key.startsWith("doc_")){
            let d = JSON.parse(localStorage.getItem(key));

            if(d.email === email){
                d.premium = true;
                localStorage.setItem(key, JSON.stringify(d));
            }
        }
    }
}
</script>

</body>
</html>
